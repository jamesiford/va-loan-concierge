kind: workflow
trigger:
  kind: OnConversationStart
  id: trigger_wf
  actions:
    # ── Capture user message ──────────────────────────────────────────
    - kind: SetVariable
      id: init_msg
      variable: Local.LatestMessage
      value: =UserMessage(System.LastMessageText)

    # ── Step 1: Orchestrator classifies the query ─────────────────────
    # Returns {"needs_advisor": bool, "needs_calculator": bool, "needs_scheduler": bool}
    - kind: InvokeAzureAgent
      id: classify
      agent:
        name: va-loan-orchestrator
      conversationId: =System.ConversationId
      input:
        messages: =Local.LatestMessage
      output:
        responseObject: Local.Route

    # ── Step 2: Branch on routing decision ────────────────────────────
    # ConditionGroup evaluates top-down; first match wins.
    - kind: ConditionGroup
      id: route
      conditions:
        # ── All three agents needed ───────────────────────────────
        - id: all_three
          condition: =And(Local.Route.needs_advisor, Local.Route.needs_calculator, Local.Route.needs_scheduler)
          actions:
            - kind: InvokeAzureAgent
              id: advisor_all
              agent:
                name: va-loan-advisor-iq
              conversationId: =System.ConversationId
              input:
                messages: =Local.LatestMessage
              output:
                messages: Local.LatestMessage
                autoSend: false
            - kind: InvokeAzureAgent
              id: calculator_all
              agent:
                name: va-loan-calculator-mcp
              conversationId: =System.ConversationId
              input:
                messages: =Local.LatestMessage
              output:
                messages: Local.LatestMessage
                autoSend: false
            - kind: InvokeAzureAgent
              id: scheduler_all
              agent:
                name: va-loan-scheduler-mcp
              conversationId: =System.ConversationId
              input:
                messages: =Local.LatestMessage
              output:
                messages: Local.LatestMessage
                autoSend: false
            - kind: InvokeAzureAgent
              id: calendar_all
              agent:
                name: va-loan-calendar-mcp
              conversationId: =System.ConversationId
              input:
                messages: =Local.LatestMessage
              output:
                messages: Local.LatestMessage
                autoSend: true

        # ── Advisor + Calculator ──────────────────────────────────
        - id: advisor_calculator
          condition: =And(Local.Route.needs_advisor, Local.Route.needs_calculator)
          actions:
            - kind: InvokeAzureAgent
              id: advisor_ac
              agent:
                name: va-loan-advisor-iq
              conversationId: =System.ConversationId
              input:
                messages: =Local.LatestMessage
              output:
                messages: Local.LatestMessage
                autoSend: false
            - kind: InvokeAzureAgent
              id: calculator_ac
              agent:
                name: va-loan-calculator-mcp
              conversationId: =System.ConversationId
              input:
                messages: =Local.LatestMessage
              output:
                messages: Local.LatestMessage
                autoSend: true

        # ── Advisor + Scheduler ───────────────────────────────────
        - id: advisor_scheduler
          condition: =And(Local.Route.needs_advisor, Local.Route.needs_scheduler)
          actions:
            - kind: InvokeAzureAgent
              id: advisor_as
              agent:
                name: va-loan-advisor-iq
              conversationId: =System.ConversationId
              input:
                messages: =Local.LatestMessage
              output:
                messages: Local.LatestMessage
                autoSend: false
            - kind: InvokeAzureAgent
              id: scheduler_as
              agent:
                name: va-loan-scheduler-mcp
              conversationId: =System.ConversationId
              input:
                messages: =Local.LatestMessage
              output:
                messages: Local.LatestMessage
                autoSend: false
            - kind: InvokeAzureAgent
              id: calendar_as
              agent:
                name: va-loan-calendar-mcp
              conversationId: =System.ConversationId
              input:
                messages: =Local.LatestMessage
              output:
                messages: Local.LatestMessage
                autoSend: true

        # ── Calculator + Scheduler ────────────────────────────────
        - id: calculator_scheduler
          condition: =And(Local.Route.needs_calculator, Local.Route.needs_scheduler)
          actions:
            - kind: InvokeAzureAgent
              id: calculator_cs
              agent:
                name: va-loan-calculator-mcp
              conversationId: =System.ConversationId
              input:
                messages: =Local.LatestMessage
              output:
                messages: Local.LatestMessage
                autoSend: false
            - kind: InvokeAzureAgent
              id: scheduler_cs
              agent:
                name: va-loan-scheduler-mcp
              conversationId: =System.ConversationId
              input:
                messages: =Local.LatestMessage
              output:
                messages: Local.LatestMessage
                autoSend: false
            - kind: InvokeAzureAgent
              id: calendar_cs
              agent:
                name: va-loan-calendar-mcp
              conversationId: =System.ConversationId
              input:
                messages: =Local.LatestMessage
              output:
                messages: Local.LatestMessage
                autoSend: true

        # ── Advisor only ──────────────────────────────────────────
        - id: advisor_only
          condition: =Local.Route.needs_advisor
          actions:
            - kind: InvokeAzureAgent
              id: advisor_solo
              agent:
                name: va-loan-advisor-iq
              conversationId: =System.ConversationId
              input:
                messages: =Local.LatestMessage
              output:
                messages: Local.LatestMessage
                autoSend: true

        # ── Calculator only ───────────────────────────────────────
        - id: calculator_only
          condition: =Local.Route.needs_calculator
          actions:
            - kind: InvokeAzureAgent
              id: calculator_solo
              agent:
                name: va-loan-calculator-mcp
              conversationId: =System.ConversationId
              input:
                messages: =Local.LatestMessage
              output:
                messages: Local.LatestMessage
                autoSend: true

        # ── Scheduler only ────────────────────────────────────────
        - id: scheduler_only
          condition: =Local.Route.needs_scheduler
          actions:
            - kind: InvokeAzureAgent
              id: scheduler_solo
              agent:
                name: va-loan-scheduler-mcp
              conversationId: =System.ConversationId
              input:
                messages: =Local.LatestMessage
              output:
                messages: Local.LatestMessage
                autoSend: false
            - kind: InvokeAzureAgent
              id: calendar_solo
              agent:
                name: va-loan-calendar-mcp
              conversationId: =System.ConversationId
              input:
                messages: =Local.LatestMessage
              output:
                messages: Local.LatestMessage
                autoSend: true

      elseActions:
        - kind: SendActivity
          id: fallback
          activity: "I'm sorry, I couldn't determine how to help with that. Could you rephrase your question about VA loans?"

    - kind: EndConversation
      id: end
id: ""
name: va-loan-concierge-workflow
description: VA Loan Concierge — routes Veteran queries to advisor, calculator, scheduler, and/or calendar agents based on LLM classification.
