kind: workflow
trigger:
  kind: OnConversationStart
  id: trigger_wf
  actions:
    # ── Capture user message ──────────────────────────────────────────
    - kind: SetVariable
      id: init_msg
      variable: Local.LatestMessage
      value: =UserMessage(System.LastMessageText)

    # Preserve the original query text — LatestMessage gets overwritten by
    # advisor/calculator outputs, but the scheduler needs the original
    # to extract day/time (e.g. "book Thursday").
    - kind: SetVariable
      id: save_original_text
      variable: Local.OriginalText
      value: =System.LastMessageText

    - kind: SetVariable
      id: init_early_exit
      variable: Local.EarlyExit
      value: =false

    # ── Step 1: Orchestrator classifies the query ─────────────────────
    # Returns {"needs_advisor": bool, "needs_calculator": bool, "needs_scheduler": bool}
    - kind: InvokeAzureAgent
      id: classify
      agent:
        name: va-loan-orchestrator
      input:
        messages: =Local.LatestMessage
      output:
        responseObject: Local.Route

    # ══════════════════════════════════════════════════════════════════
    # Step 2: Advisor (if needed)
    # No HIL — runs and returns grounded answer with citations.
    # ══════════════════════════════════════════════════════════════════
    - kind: ConditionGroup
      id: check_advisor
      conditions:
        - id: run_advisor
          condition: =Local.Route.needs_advisor
          actions:
            - kind: InvokeAzureAgent
              id: advisor
              agent:
                name: va-loan-advisor-iq
              input:
                messages: =Local.LatestMessage
              output:
                messages: Local.LatestMessage
                autoSend: true

    # ══════════════════════════════════════════════════════════════════
    # Step 3: Calculator HIL (if needed and not early-exited)
    #
    # Flow: ask for loan details → skip/done/provide →
    #       run calculator → followup loop (up to 3 retries)
    #
    # "Done" keywords at any HIL pause set EarlyExit=true and skip
    # all remaining agents (scheduler, calendar).
    # ══════════════════════════════════════════════════════════════════
    - kind: ConditionGroup
      id: check_calculator
      conditions:
        - id: run_calculator
          condition: =And(Local.Route.needs_calculator, Not(Local.EarlyExit))
          actions:
            - kind: Question
              id: ask_loan_details
              prompt: "To calculate your refinance savings, I need five pieces of information:\n1. Current loan balance (e.g. $320,000)\n2. Current interest rate (e.g. 6.8%)\n3. New/quoted interest rate (e.g. 6.1%)\n4. Remaining term in years (e.g. 27)\n5. VA funding fee exempt? (yes if service-connected disability)\n\nPlease provide all five, or say **skip** to move on. Say **that's all** if you're done."
              entity: StringPrebuiltEntity
              variable: Local.LoanDetails
            - kind: ConditionGroup
              id: check_loan_input
              conditions:
                # ── Done — exit early, skip all remaining agents ──
                - id: calc_done
                  condition: '=Or("that''s all" in Lower(Local.LoanDetails), "i''m done" in Lower(Local.LoanDetails), "no more" in Lower(Local.LoanDetails), "that''s it" in Lower(Local.LoanDetails), "nothing else" in Lower(Local.LoanDetails), "all set" in Lower(Local.LoanDetails), "all done" in Lower(Local.LoanDetails))'
                  actions:
                    - kind: SetVariable
                      id: set_exit_calc
                      variable: Local.EarlyExit
                      value: =true
                    - kind: SendActivity
                      id: exit_msg_calc
                      activity: "Got it — if you need anything else about VA loans, just start a new conversation."
                # ── Skip — bypass calculator, continue to next agent ──
                - id: skip_calc
                  condition: '=Or("skip" in Lower(Local.LoanDetails), "move on" in Lower(Local.LoanDetails), "no calc" in Lower(Local.LoanDetails), "never mind" in Lower(Local.LoanDetails), "don''t calculate" in Lower(Local.LoanDetails), "forget it" in Lower(Local.LoanDetails), "use defaults" in Lower(Local.LoanDetails), "default" in Lower(Local.LoanDetails))'
                  actions:
                    - kind: SendActivity
                      id: calc_skipped
                      activity: "No problem — skipping the refinance calculation."
              # ── User provided details — enrich and run calculator ──
              elseActions:
                - kind: SetVariable
                  id: enrich_calc
                  variable: Local.LatestMessage
                  value: '=UserMessage(Concatenate(System.LastMessageText, " [Borrower-provided loan details: ", Local.LoanDetails, ". Use these details for the refinance calculation. Extract current_rate, new_rate, balance, remaining_term, and funding_fee_exempt from the borrower response above.]"))'
                - kind: SetVariable
                  id: init_calc_retry
                  variable: Local.CalcRetryCount
                  value: =0
                - kind: InvokeAzureAgent
                  id: calculator
                  agent:
                    name: va-loan-calculator-mcp
                  input:
                    messages: =Local.LatestMessage
                  output:
                    messages: Local.LatestMessage
                    autoSend: true
                # ── Post-calc followup loop ────────────────────────
                - kind: Question
                  id: calc_followup
                  prompt: "Does the calculation look right? If the calculator asked for more details, please provide them now. You can also say **skip** to move on, or **that's all** if you're done."
                  entity: StringPrebuiltEntity
                  variable: Local.CalcFollowup
                - kind: ConditionGroup
                  id: check_calc_followup
                  conditions:
                    # ── Done — exit early ──
                    - id: calc_followup_done
                      condition: '=Or("that''s all" in Lower(Local.CalcFollowup), "i''m done" in Lower(Local.CalcFollowup), "no more" in Lower(Local.CalcFollowup), "that''s it" in Lower(Local.CalcFollowup), "nothing else" in Lower(Local.CalcFollowup), "all set" in Lower(Local.CalcFollowup), "all done" in Lower(Local.CalcFollowup))'
                      actions:
                        - kind: SetVariable
                          id: set_exit_calc_followup
                          variable: Local.EarlyExit
                          value: =true
                        - kind: SendActivity
                          id: exit_msg_calc_followup
                          activity: "Got it — if you need anything else about VA loans, just start a new conversation."
                    # ── Good — continue to next agent ──
                    - id: calc_good
                      condition: '=Or("yes" in Lower(Local.CalcFollowup), "looks good" in Lower(Local.CalcFollowup), "correct" in Lower(Local.CalcFollowup), "right" in Lower(Local.CalcFollowup), "great" in Lower(Local.CalcFollowup), "perfect" in Lower(Local.CalcFollowup), "continue" in Lower(Local.CalcFollowup))'
                      actions: []
                    # ── Skip — continue to next agent ──
                    - id: calc_skip_followup
                      condition: '=Or("skip" in Lower(Local.CalcFollowup), "move on" in Lower(Local.CalcFollowup), "no calc" in Lower(Local.CalcFollowup), "never mind" in Lower(Local.CalcFollowup), "don''t calculate" in Lower(Local.CalcFollowup), "forget it" in Lower(Local.CalcFollowup), "use defaults" in Lower(Local.CalcFollowup), "default" in Lower(Local.CalcFollowup))'
                      actions:
                        - kind: SendActivity
                          id: calc_skipped_followup
                          activity: "Understood — moving on."
                  # ── Else: one retry attempt, then move on ──
                  elseActions:
                    - kind: ConditionGroup
                      id: calc_retry
                      conditions:
                        - id: calc_retry_ok
                          condition: =Local.CalcRetryCount < 3
                          actions:
                            - kind: SetVariable
                              id: inc_calc_retry
                              variable: Local.CalcRetryCount
                              value: =Local.CalcRetryCount + 1
                            - kind: SetVariable
                              id: enrich_calc_retry
                              variable: Local.LatestMessage
                              value: '=UserMessage(Concatenate(System.LastMessageText, " [Additional borrower details: ", Local.CalcFollowup, ". Use ALL borrower-provided details to call the refi_savings_calculator tool now.]"))'
                            - kind: InvokeAzureAgent
                              id: calculator_retry
                              agent:
                                name: va-loan-calculator-mcp
                              input:
                                messages: =Local.LatestMessage
                              output:
                                messages: Local.LatestMessage
                                autoSend: true
                            - kind: GotoAction
                              id: goto_calc_followup
                              actionId: calc_followup
                      elseActions:
                        - kind: SendActivity
                          id: calc_max_retry
                          activity: "I didn't quite understand that, but no problem — we'll keep moving."

    # ══════════════════════════════════════════════════════════════════
    # Step 4: Scheduler + Calendar HIL (if needed and not early-exited)
    #
    # Flow: run scheduler → confirm/reschedule/decline →
    #       confirm (default) → calendar creates M365 event
    #       reschedule (up to 3) → re-run scheduler, loop back
    #       decline → skip calendar
    # ══════════════════════════════════════════════════════════════════
    - kind: ConditionGroup
      id: check_scheduler
      conditions:
        - id: run_scheduler
          condition: =And(Local.Route.needs_scheduler, Not(Local.EarlyExit))
          actions:
            # Pass the original user text so the agent can extract day/time.
            # Omit conversationId so the scheduler gets a fresh, isolated context
            # (no advisor/calculator history polluting the LLM's tool-call decision).
            - kind: SetVariable
              id: build_sched_input
              variable: Local.SchedulerInput
              value: '=UserMessage(Concatenate(Local.OriginalText, " — Schedule this appointment. Appointment type: VA Loan Consultation."))'
            - kind: InvokeAzureAgent
              id: scheduler
              agent:
                name: va-loan-scheduler-mcp
              input:
                messages: =Local.SchedulerInput
              output:
                messages: Local.LatestMessage
                autoSend: true
            # ── Appointment confirmation loop ──────────────────────
            - kind: SetVariable
              id: init_resched_count
              variable: Local.RescheduleCount
              value: =0
            - kind: Question
              id: confirm_appt
              prompt: "Does this appointment work for you? I can add it to your calendar, reschedule it, or skip the calendar event."
              entity: StringPrebuiltEntity
              variable: Local.ApptConfirmation
            - kind: ConditionGroup
              id: check_appt
              conditions:
                # ── Confirm — add to calendar ──
                - id: appt_confirm
                  condition: '=Or("yes" in Lower(Local.ApptConfirmation), "confirm" in Lower(Local.ApptConfirmation), "looks good" in Lower(Local.ApptConfirmation), "perfect" in Lower(Local.ApptConfirmation), "great" in Lower(Local.ApptConfirmation), "add it" in Lower(Local.ApptConfirmation), "add to" in Lower(Local.ApptConfirmation), "calendar" in Lower(Local.ApptConfirmation), "book it" in Lower(Local.ApptConfirmation), "works for me" in Lower(Local.ApptConfirmation), "sounds good" in Lower(Local.ApptConfirmation), "that works" in Lower(Local.ApptConfirmation))'
                  actions:
                    - kind: InvokeAzureAgent
                      id: calendar
                      agent:
                        name: va-loan-calendar-mcp
                      input:
                        messages: =Local.LatestMessage
                      output:
                        messages: Local.LatestMessage
                        autoSend: true
                # ── Decline — skip calendar, appointment still confirmed ──
                - id: appt_decline
                  condition: '=Or("no thank" in Lower(Local.ApptConfirmation), "skip" in Lower(Local.ApptConfirmation), "don''t" in Lower(Local.ApptConfirmation), "cancel" in Lower(Local.ApptConfirmation), "decline" in Lower(Local.ApptConfirmation), "not now" in Lower(Local.ApptConfirmation))'
                  actions:
                    - kind: SendActivity
                      id: skip_calendar
                      activity: "No problem — your appointment is still confirmed with the details above. I've skipped the calendar event."
                # ── Reschedule — re-run scheduler, loop back ──
                - id: appt_reschedule
                  condition: '=And(Local.RescheduleCount < 3, Or("reschedule" in Lower(Local.ApptConfirmation), "different" in Lower(Local.ApptConfirmation), "change" in Lower(Local.ApptConfirmation), "instead" in Lower(Local.ApptConfirmation), "another" in Lower(Local.ApptConfirmation), "monday" in Lower(Local.ApptConfirmation), "tuesday" in Lower(Local.ApptConfirmation), "wednesday" in Lower(Local.ApptConfirmation), "thursday" in Lower(Local.ApptConfirmation), "friday" in Lower(Local.ApptConfirmation), "saturday" in Lower(Local.ApptConfirmation), "morning" in Lower(Local.ApptConfirmation), "afternoon" in Lower(Local.ApptConfirmation), "earlier" in Lower(Local.ApptConfirmation), "later" in Lower(Local.ApptConfirmation)))'
                  actions:
                    - kind: SetVariable
                      id: inc_resched
                      variable: Local.RescheduleCount
                      value: =Local.RescheduleCount + 1
                    - kind: SetVariable
                      id: enrich_resched
                      variable: Local.ReschedInput
                      value: '=UserMessage(Concatenate("The Veteran wants to reschedule. New preference: ", Local.ApptConfirmation, ". Use a DIFFERENT day or time than before. [Appointment type: VA Loan Consultation]"))'
                    - kind: InvokeAzureAgent
                      id: scheduler_resched
                      agent:
                        name: va-loan-scheduler-mcp
                      input:
                        messages: =Local.ReschedInput
                      output:
                        messages: Local.LatestMessage
                        autoSend: true
                    - kind: GotoAction
                      id: goto_confirm_appt
                      actionId: confirm_appt
              # ── Default: unrecognized input — move on without calendar ──
              elseActions:
                - kind: SendActivity
                  id: appt_unrecognized
                  activity: "I didn't quite understand that, but no problem — we'll keep moving. Your appointment is still confirmed with the details above."

    # ── General / meta queries (no agents needed) ──────────────────────
    - kind: ConditionGroup
      id: check_general
      conditions:
        - id: general_query
          condition: =Not(Or(Local.Route.needs_advisor, Local.Route.needs_calculator, Local.Route.needs_scheduler))
          actions:
            - kind: SendActivity
              id: general_response
              activity: "I'm your VA Loan Concierge! Here's what I can help you with:\n\n1. **VA Loan Guidance** — I can answer questions about eligibility, IRRRL qualification, entitlement, funding fees, and the loan process, all grounded in official VA guidelines and lender products.\n\n2. **Refinance Savings** — I can calculate your monthly savings, break-even timeline, and closing costs if you're considering a refinance.\n\n3. **Appointment Scheduling** — I can book a consultation with a loan officer and add it to your calendar.\n\nWhat would you like to know?"

    - kind: EndConversation
      id: end
id: ""
name: va-loan-concierge-workflow
description: VA Loan Concierge — routes Veteran queries to advisor, calculator, scheduler, and/or calendar agents with human-in-the-loop confirmation steps.
