                      condition: '=Or(Contains(Lower(Local.CalcFollowup), "skip"), Contains(Lower(Local.CalcFollowup), "move on"), Contains(Lower(Local.CalcFollowup), "no calc"), Contains(Lower(Local.CalcFollowup), "never mind"), Contains(Lower(Local.CalcFollowup), "don''t calculate"), Contains(Lower(Local.CalcFollowup), "forget it"), Contains(Lower(Local.CalcFollowup), "use defaults"), Contains(Lower(Local.CalcFollowup), "default"))'
                      actions:
