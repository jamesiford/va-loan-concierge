# ---------------------------------------------------------------------------
# VA Loan Concierge — Azure Developer CLI (azd) project definition
# ---------------------------------------------------------------------------
# Usage:
#   azd up       — provision infrastructure + deploy code + register agents
#   azd down     — tear everything down
#
# Manual step after azd up:
#   Configure Work IQ Calendar connection (see README)
# ---------------------------------------------------------------------------

name: va-loan-concierge

metadata:
  template: va-loan-concierge

infra:
  provider: bicep
  path: infra

services:
  mcp-server:
    host: function
    language: python
    project: ./mcp-server

  web-app:
    host: appservice
    language: python
    project: ./

hooks:
  postprovision:
    shell: sh
    run: infra/hooks/postprovision.sh

  predeploy:
    shell: sh
    run: infra/hooks/predeploy.sh

  postdeploy:
    shell: sh
    run: infra/hooks/postdeploy.sh
